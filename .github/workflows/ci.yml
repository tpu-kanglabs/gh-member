name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Cache golangci-lint
        uses: actions/cache@v5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('mise.toml') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-${{ hashFiles('mise.toml') }}-
            golangci-lint-${{ runner.os }}-
      - name: Lint
        run: mise run lint
      - name: Check format
        run: mise run format
      - name: Build
        run: mise run build
